name: Fund Daily Strategy

on:
  schedule:
    - cron: "40 5 * * 1-5" # 13:40 Asia/Shanghai (UTC+8),提前触发避免队列延迟
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
      - name: Cache fund history
        uses: actions/cache@v4
        with:
          path: cache
          key: fund-cache-${{ runner.os }}-${{ hashFiles('config/funds.json') }}
          restore-keys: |
            fund-cache-${{ runner.os }}-
      - name: Install deps
        run: npm install
      - name: Run
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          FAST_MODE: '1'
          FUND_CONCURRENCY: '12'
          HTTP_TIMEOUT_MS: '9000'
        run: npm run run
